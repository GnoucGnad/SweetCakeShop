<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - Sweet Cake Shop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-brand"><span class="brand-icon">🧁</span> Sweet<span>Cake</span></a>
            <ul class="navbar-nav" id="navbarNav">
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="products.html">Sản phẩm</a></li>
                <li><a href="products.html?category=1">Bánh ngọt</a></li>
                <li><a href="products.html?category=2">Bánh mặn</a></li>
            </ul>
            <div class="navbar-actions">
                <a href="cart.html" class="cart-btn">🛒<span class="cart-badge"></span></a>
                <button class="navbar-toggle" id="navToggle"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <!-- Product Detail -->
    <section class="product-detail-page">
        <div class="container">
            <div class="breadcrumb" style="margin-bottom: 2rem; display:flex; gap:0.5rem; font-size:0.9rem;">
                <a href="index.html" style="color:var(--primary);">Trang chủ</a>
                <span style="color:var(--text-muted);">/</span>
                <a href="products.html" style="color:var(--primary);">Sản phẩm</a>
                <span style="color:var(--text-muted);">/</span>
                <span id="breadcrumbName" style="color:var(--text-muted);"></span>
            </div>

            <div class="product-detail-layout" id="productDetail">
                <div class="loading-overlay"><div class="spinner"></div></div>
            </div>

            <!-- Reviews -->
            <div class="reviews-section" id="reviewsSection" style="display:none;">
                <div class="section-title" style="text-align:left;">
                    <h2>Đánh Giá Sản Phẩm</h2>
                </div>
                <div id="reviewsList"></div>
            </div>

            <!-- Related Products -->
            <div style="margin-top: 3rem;" id="relatedSection" style="display:none;">
                <div class="section-title">
                    <h2>Sản Phẩm Liên Quan</h2>
                </div>
                <div class="products-grid" id="relatedProducts"></div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 SweetCake Shop. Đồ án GR1 - Đặng Đình Cường - MSSV: 20225795</p>
            </div>
        </div>
    </footer>

    <button class="scroll-top">↑</button>

    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script>
        let currentProduct = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                window.location.href = 'products.html';
                return;
            }

            try {
                currentProduct = await Api.getProductById(id);
                renderProductDetail(currentProduct);

                // Load reviews
                try {
                    const reviews = await Api.getReviewsByProduct(id);
                    if (reviews.length > 0) {
                        renderReviews(reviews);
                    }
                } catch(e) {}

                // Load related products
                try {
                    const allProducts = await Api.getProductsByCategory(currentProduct.optionCakeId);
                    const related = allProducts.filter(p => p.cakeId !== currentProduct.cakeId).slice(0, 4);
                    if (related.length > 0) {
                        document.getElementById('relatedProducts').innerHTML =
                            related.map(p => App.createProductCard(p)).join('');
                    }
                } catch(e) {}

                // Update page title
                document.title = `${currentProduct.cakeName} - Sweet Cake Shop`;

            } catch (e) {
                document.getElementById('productDetail').innerHTML =
                    '<p style="text-align:center;padding:3rem;color:var(--text-muted);grid-column:1/-1;">Không tìm thấy sản phẩm.</p>';
            }
        });

        function renderProductDetail(product) {
            const category = product.optionCake ? product.optionCake.categoryName : '';
            const categoryVn = category === 'Sweet' ? 'Bánh ngọt' : 'Bánh mặn';
            const inStock = product.quantity > 0;
            const stockClass = product.quantity <= 3 ? (product.quantity <= 0 ? 'out' : 'low') : '';
            const stockText = inStock ? `Còn ${product.quantity} sản phẩm` : 'Hết hàng';

            document.getElementById('breadcrumbName').textContent = product.cakeName;

            document.getElementById('productDetail').innerHTML = `
                <div class="product-gallery">
                    <div class="product-main-image">
                        <img src="${App.getProductImage(product)}" alt="${product.cakeName}">
                    </div>
                </div>
                <div class="product-info">
                    <span class="category-tag">${categoryVn}</span>
                    <h1>${product.cakeName}</h1>

                    <div class="product-price-box">
                        <span class="price">${App.formatPrice(product.price)}</span>
                        <span class="currency">USD</span>
                    </div>

                    <p class="product-description">${product.description || 'Bánh được làm thủ công từ nguyên liệu tươi ngon nhất, mang đến hương vị tuyệt hảo cho bạn và gia đình.'}</p>

                    <div class="product-stock">
                        <span class="stock-dot ${stockClass}"></span>
                        <span>${stockText}</span>
                    </div>

                    <div class="quantity-selector">
                        <span class="quantity-label">Số lượng:</span>
                        <div class="quantity-controls">
                            <button onclick="changeQty(-1)">−</button>
                            <input type="number" id="qtyInput" value="1" min="1" max="${product.quantity}">
                            <button onclick="changeQty(1)">+</button>
                        </div>
                    </div>

                    <div class="product-actions">
                        <button class="btn btn-primary btn-lg" onclick="addToCart()" ${!inStock ? 'disabled' : ''}>
                            🛒 Thêm Vào Giỏ Hàng
                        </button>
                        <a href="cart.html" class="btn btn-outline btn-lg">Xem Giỏ Hàng</a>
                    </div>
                </div>
            `;
        }

        function changeQty(delta) {
            const input = document.getElementById('qtyInput');
            let val = parseInt(input.value) + delta;
            if (val < 1) val = 1;
            if (currentProduct && val > currentProduct.quantity) val = currentProduct.quantity;
            input.value = val;
        }

        function addToCart() {
            if (!currentProduct) return;
            const qty = parseInt(document.getElementById('qtyInput').value) || 1;
            Cart.addItem(currentProduct, qty);
        }

        function renderReviews(reviews) {
            const section = document.getElementById('reviewsSection');
            section.style.display = 'block';
            const list = document.getElementById('reviewsList');

            list.innerHTML = reviews.map(r => {
                const stars = r.rating ? '⭐'.repeat(r.rating) + '☆'.repeat(5 - r.rating) : 'Chưa đánh giá';
                const date = r.createdAt ? new Date(r.createdAt).toLocaleDateString('vi-VN') : '';
                return `
                    <div class="review-card">
                        <div class="review-header">
                            <div class="review-stars">${stars}</div>
                            <span class="review-date">${date}</span>
                        </div>
                        <p class="review-comment">${r.customerComment || 'Không có bình luận.'}</p>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
