<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - Sweet Cake Shop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-brand"><span class="brand-icon">🧁</span> Sweet<span>Cake</span></a>
            <ul class="navbar-nav" id="navbarNav">
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="products.html">Sản phẩm</a></li>
                <li><a href="products.html?category=1">Bánh ngọt</a></li>
                <li><a href="products.html?category=2">Bánh mặn</a></li>
            </ul>
            <div class="navbar-actions">
                <a href="cart.html" class="cart-btn">🛒<span class="cart-badge"></span></a>
                <button class="navbar-toggle" id="navToggle"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <h1>💳 Thanh Toán</h1>
            <div class="breadcrumb">
                <a href="index.html">Trang chủ</a>
                <span>/</span>
                <a href="cart.html">Giỏ hàng</a>
                <span>/</span>
                <span>Thanh toán</span>
            </div>
        </div>
    </div>

    <!-- Checkout -->
    <section class="checkout-page">
        <div class="container">
            <div id="checkoutContent">
                <div class="checkout-layout">
                    <!-- Form -->
                    <div class="checkout-form">
                        <h2>Thông Tin Giao Hàng</h2>
                        <form id="checkoutForm" onsubmit="submitOrder(event)">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="firstName">Họ *</label>
                                    <input type="text" class="form-control" id="firstName" required placeholder="Nguyễn" oninvalid="this.setCustomValidity('Vui lòng điền đầy đủ thông tin')" oninput="this.setCustomValidity('')">
                                </div>
                                <div class="form-group">
                                    <label for="lastName">Tên *</label>
                                    <input type="text" class="form-control" id="lastName" required placeholder="Văn A" oninvalid="this.setCustomValidity('Vui lòng điền đầy đủ thông tin')" oninput="this.setCustomValidity('')">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="phone">Số điện thoại *</label>
                                    <input type="tel" class="form-control" id="phone" required placeholder="0912 345 678" oninvalid="this.setCustomValidity('Vui lòng điền đầy đủ thông tin')" oninput="this.setCustomValidity('')">
                                </div>
                                <div class="form-group">
                                    <label for="email">Email</label>
                                    <input type="email" class="form-control" id="email" placeholder="email@example.com">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="address">Địa chỉ giao hàng *</label>
                                <input type="text" class="form-control" id="address" required placeholder="Số nhà, đường, quận/huyện, thành phố" oninvalid="this.setCustomValidity('Vui lòng điền đầy đủ thông tin')" oninput="this.setCustomValidity('')">
                            </div>

                            <h2 style="margin-top: 2rem;">Phương Thức Thanh Toán</h2>
                            <div class="payment-options">
                                <div class="payment-option">
                                    <input type="radio" name="payment" id="payCash" value="cash" checked>
                                    <label for="payCash">
                                        <span class="payment-icon">💵</span>
                                        <span class="payment-name">Tiền mặt</span>
                                    </label>
                                </div>
                                <div class="payment-option">
                                    <input type="radio" name="payment" id="payCard" value="credit_card">
                                    <label for="payCard">
                                        <span class="payment-icon">💳</span>
                                        <span class="payment-name">Thẻ tín dụng</span>
                                    </label>
                                </div>
                                <div class="payment-option">
                                    <input type="radio" name="payment" id="payPaypal" value="paypal">
                                    <label for="payPaypal">
                                        <span class="payment-icon">🅿️</span>
                                        <span class="payment-name">PayPal</span>
                                    </label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-accent btn-lg" style="width:100%;margin-top:2rem;" id="submitBtn">
                                ✓ Xác Nhận Đặt Hàng
                            </button>
                        </form>
                    </div>

                    <!-- Order Summary -->
                    <div class="cart-summary">
                        <h3>Đơn Hàng Của Bạn</h3>
                        <div id="orderItems"></div>
                        <div class="summary-row" style="margin-top:1rem;">
                            <span>Tạm tính</span>
                            <span id="subtotal"></span>
                        </div>
                        <div class="summary-row">
                            <span>Phí vận chuyển</span>
                            <span style="color:var(--success);">Miễn phí</span>
                        </div>
                        <div class="summary-row total">
                            <span>Tổng cộng</span>
                            <span class="amount" id="totalPrice"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 SweetCake Shop. Đồ án GR1 - Đặng Đình Cường - MSSV: 20225795</p>
            </div>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const items = Cart.getItems();

            if (items.length === 0) {
                window.location.href = 'cart.html';
                return;
            }

            // Render order items
            const orderItemsHtml = items.map(item => `
                <div class="summary-row" style="padding: 0.5rem 0; border-bottom: 1px solid var(--border-light);">
                    <span style="flex:1;">${item.cakeName} <span style="color:var(--text-muted);">×${item.quantity}</span></span>
                    <span style="font-weight:600;">${App.formatPrice(item.price * item.quantity)}</span>
                </div>
            `).join('');

            document.getElementById('orderItems').innerHTML = orderItemsHtml;
            document.getElementById('subtotal').textContent = App.formatPrice(Cart.getTotalPrice());
            document.getElementById('totalPrice').textContent = App.formatPrice(Cart.getTotalPrice());
        });

        async function submitOrder(e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Đang xử lý...';

            try {
                const items = Cart.getItems();
                const paymentMethod = document.querySelector('input[name="payment"]:checked').value;

                const orderData = {
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value,
                    address: document.getElementById('address').value,
                    paymentMethod: paymentMethod,
                    items: items.map(item => ({
                        cakeId: item.cakeId,
                        quantity: item.quantity
                    }))
                };

                const result = await Api.createOrder(orderData);

                // Clear cart
                Cart.clear();

                // Show success
                document.getElementById('checkoutContent').innerHTML = `
                    <div class="order-success">
                        <div class="success-icon">✓</div>
                        <h2>Đặt Hàng Thành Công! 🎉</h2>
                        <p style="font-size:1.1rem;color:var(--text-light);margin-bottom:1rem;">
                            Cảm ơn bạn đã mua hàng tại SweetCake Shop!
                        </p>
                        <div style="background:var(--bg-light);border-radius:var(--radius-md);padding:1.5rem;display:inline-block;margin-bottom:2rem;">
                            <p style="margin-bottom:0.5rem;"><strong>Mã đơn hàng:</strong> #${result.orderId}</p>
                            <p style="margin-bottom:0.5rem;"><strong>Tổng tiền:</strong> ${App.formatPrice(result.totalPrice)}</p>
                            <p><strong>Trạng thái:</strong> <span style="color:var(--warning);">Đang xử lý</span></p>
                        </div>
                        <br>
                        <a href="index.html" class="btn btn-primary btn-lg">← Quay Về Trang Chủ</a>
                        <a href="products.html" class="btn btn-outline btn-lg">Tiếp Tục Mua Sắm</a>
                    </div>
                `;

            } catch (error) {
                App.showToast(error.message || 'Đặt hàng thất bại. Vui lòng thử lại.', 'error');
                btn.disabled = false;
                btn.textContent = '✓ Xác Nhận Đặt Hàng';
            }
        }
    </script>
</body>
</html>
