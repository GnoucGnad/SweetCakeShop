<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - Sweet Cake Shop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-brand"><span class="brand-icon">🧁</span> Sweet<span>Cake</span></a>
            <ul class="navbar-nav" id="navbarNav">
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="products.html">Sản phẩm</a></li>
                <li><a href="products.html?category=1">Bánh ngọt</a></li>
                <li><a href="products.html?category=2">Bánh mặn</a></li>
            </ul>
            <div class="navbar-actions">
                <a href="cart.html" class="cart-btn">🛒<span class="cart-badge"></span></a>
                <button class="navbar-toggle" id="navToggle"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <h1>🛒 Giỏ Hàng</h1>
            <div class="breadcrumb">
                <a href="index.html">Trang chủ</a>
                <span>/</span>
                <span>Giỏ hàng</span>
            </div>
        </div>
    </div>

    <!-- Cart Page -->
    <section class="cart-page">
        <div class="container">
            <div id="cartContent">
                <!-- Will be rendered by JS -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 SweetCake Shop. Đồ án GR1 - Đặng Đình Cường - MSSV: 20225795</p>
            </div>
        </div>
    </footer>

    <button class="scroll-top">↑</button>

    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
        });

        function renderCart() {
            const items = Cart.getItems();
            const container = document.getElementById('cartContent');

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="cart-empty">
                        <div class="cart-empty-icon">🛒</div>
                        <h3>Giỏ hàng trống</h3>
                        <p style="color:var(--text-light);margin-bottom:1.5rem;">Bạn chưa thêm sản phẩm nào vào giỏ hàng.</p>
                        <a href="products.html" class="btn btn-primary btn-lg">Mua sắm ngay →</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="cart-layout">
                    <div class="cart-items">
                        <div class="cart-header">
                            <span>Sản phẩm</span>
                            <span>Đơn giá</span>
                            <span>Số lượng</span>
                            <span>Thành tiền</span>
                            <span></span>
                        </div>
                        ${items.map(item => `
                            <div class="cart-item" data-id="${item.cakeId}">
                                <div class="cart-item-info">
                                    <div class="cart-item-image">
                                        <img src="${App.getProductImage(item)}" alt="${item.cakeName}">
                                    </div>
                                    <div>
                                        <div class="cart-item-name">${item.cakeName}</div>
                                        <div class="cart-item-category">${item.categoryName === 'Sweet' ? 'Bánh ngọt' : 'Bánh mặn'}</div>
                                    </div>
                                </div>
                                <div class="cart-item-price">${App.formatPrice(item.price)}</div>
                                <div class="cart-item-qty">
                                    <div class="quantity-controls">
                                        <button onclick="updateItemQty(${item.cakeId}, ${item.quantity - 1})">−</button>
                                        <input type="number" value="${item.quantity}" min="1"
                                            onchange="updateItemQty(${item.cakeId}, parseInt(this.value))">
                                        <button onclick="updateItemQty(${item.cakeId}, ${item.quantity + 1})">+</button>
                                    </div>
                                </div>
                                <div class="cart-item-subtotal">${App.formatPrice(item.price * item.quantity)}</div>
                                <button class="cart-item-remove" onclick="removeItem(${item.cakeId})" title="Xóa">✕</button>
                            </div>
                        `).join('')}
                        
                        <!-- Order Note & Delivery Time -->
                        <div class="cart-extra-options" style="padding: var(--space-xl); border-top: 1px solid var(--border-light);">
                            <div style="margin-bottom: var(--space-xl);">
                                <label for="orderNote" style="display: block; font-weight: 600; margin-bottom: var(--space-sm);">Ghi chú đơn hàng</label>
                                <textarea id="orderNote" class="form-control" rows="3" placeholder="Nhập ghi chú cho nhà hàng..."></textarea>
                            </div>
                            
                            <div>
                                <h4 style="color: var(--secondary); font-size: 1.1rem; border-bottom: 2px solid var(--secondary); padding-bottom: var(--space-xs); margin-bottom: var(--space-md); text-transform: uppercase;">Hẹn giờ nhận hàng</h4>
                                <div class="form-row" style="margin-bottom: 0;">
                                    <div>
                                        <label for="deliveryDate" style="display: block; font-weight: 600; margin-bottom: var(--space-xs);">Ngày nhận hàng</label>
                                        <input type="date" id="deliveryDate" class="form-control" style="background: var(--border-light);">
                                    </div>
                                    <div>
                                        <label for="deliveryTime" style="display: block; font-weight: 600; margin-bottom: var(--space-xs);">Thời gian nhận hàng</label>
                                        <select id="deliveryTime" class="form-control" style="background: var(--border-light);">
                                            <option value="Càng sớm càng tốt">Càng sớm càng tốt</option>
                                            <option value="Sáng: 08h00 - 12h00">Sáng: 08h00 - 12h00</option>
                                            <option value="Chiều: 14h00 - 18h00">Chiều: 14h00 - 18h00</option>
                                            <option value="Tối: 19h00 - 21h00">Tối: 19h00 - 21h00</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="cart-summary">
                        <h3>Tóm Tắt Đơn Hàng</h3>
                        <div class="summary-row">
                            <span>Số sản phẩm</span>
                            <span>${Cart.getTotalItems()}</span>
                        </div>
                        <div class="summary-row">
                            <span>Tạm tính</span>
                            <span>${App.formatPrice(Cart.getTotalPrice())}</span>
                        </div>
                        <div class="summary-row">
                            <span>Phí vận chuyển</span>
                            <span style="color:var(--success);">Miễn phí</span>
                        </div>
                        <div class="summary-row total">
                            <span>Tổng cộng</span>
                            <span class="amount">${App.formatPrice(Cart.getTotalPrice())}</span>
                        </div>
                        <a href="checkout.html" class="btn btn-primary btn-lg">Tiến Hành Thanh Toán →</a>
                        <a href="products.html" class="btn btn-outline" style="width:100%;margin-top:0.5rem;text-transform: uppercase;font-weight:700;">← Tiếp tục mua sắm</a>
                    </div>
                </div>
            `;
            
            // Set default date to today
            const today = new Date().toISOString().split('T')[0];
            const dateInput = document.getElementById('deliveryDate');
            if (dateInput) {
                dateInput.value = today;
                dateInput.min = today;
            }
        }

        function updateItemQty(cakeId, qty) {
            if (qty <= 0) {
                removeItem(cakeId);
                return;
            }
            Cart.updateQuantity(cakeId, qty);
            renderCart();
        }

        function removeItem(cakeId) {
            Cart.removeItem(cakeId);
            App.showToast('Đã xóa sản phẩm khỏi giỏ hàng', 'warning');
            renderCart();
        }
    </script>
</body>
</html>
